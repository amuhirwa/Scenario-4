<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Commander's Associate — RDF Dismounted Dashboard</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Leaflet -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- FontAwesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Map pane now acts as full screen background -->
    <div id="map"></div>

    <!-- UI Overlay container -->
    <div id="ui-overlay">
      <!-- ── Header ──────────────────────────────────────────────────────────────── -->
      <header>
        <div class="header-left">
          <div class="logo">
            <i class="fa-solid fa-satellite-dish"></i>
            COMMANDER'S ASSOCIATE
          </div>
          <div class="sub">
            TACTICAL DISMOUNTED AWARENESS · OVERWATCH PROTOTYPE v2.0
          </div>
        </div>
        <div class="spacer"></div>
        <div id="soldier-count">0 ACTIVE</div>
        <div id="user-badge" style="display: none">
          <i class="fa-solid fa-user-shield"></i>
          <span id="user-name"></span>
        </div>
        <button
          id="logout-btn"
          class="logout-btn"
          style="display: none"
          onclick="doLogout()"
        >
          <i class="fa-solid fa-right-from-bracket"></i> SIGN OUT
        </button>
        <div id="conn-status" class="status-pill connecting">
          <div class="dot"></div>
          <span class="conn-text">UPLINK ESTABLISHING…</span>
        </div>
      </header>

      <!-- ── Main Data Panel ─────────────────────────────────────────────────────── -->
      <aside id="sidebar" class="glass-panel">
        <!-- Alerts section -->
        <div id="alerts-section">
          <div class="sidebar-header">
            <i class="fa-solid fa-triangle-exclamation"></i>
            &nbsp;&nbsp;CRITICAL ALERTS
          </div>
          <div id="alerts-container">
            <div id="no-alerts">No active alerts</div>
          </div>
        </div>

        <!-- Force list section -->
        <div id="force-list-section">
          <div class="sidebar-header">
            <i class="fa-solid fa-satellite-dish"></i>&nbsp;&nbsp;SQUAD
            TELEMETRY
          </div>
          <div id="soldier-list">
            <div class="empty-state">
              <i class="fa-solid fa-spinner fa-spin"></i><br />
              Awaiting telemetry data…
            </div>
          </div>
        </div>
      </aside>

      <!-- Legend overlay -->
      <div id="legend" class="glass-panel"></div>
    </div>

    <script src="app.js"></script>

    <!-- ── Login overlay ──────────────────────────────────────────────────── -->
    <div id="login-overlay">
      <div class="login-card">
        <div class="login-logo">
          <i class="fa-solid fa-satellite-dish"></i>
        </div>
        <h1 class="login-title">COMMANDER'S ASSOCIATE</h1>
        <p class="login-sub">RDF TACTICAL AWARENESS · PROTOTYPE v2.0</p>

        <form id="login-form" onsubmit="handleLogin(event)">
          <div class="login-field">
            <label for="login-email">EMAIL</label>
            <div class="login-input-wrap">
              <i class="fa-solid fa-at"></i>
              <input
                id="login-email"
                type="email"
                autocomplete="username"
                placeholder="commander@rdf.mil"
                required
              />
            </div>
          </div>
          <div class="login-field">
            <label for="login-pass">PASSWORD</label>
            <div class="login-input-wrap">
              <i class="fa-solid fa-lock"></i>
              <input
                id="login-pass"
                type="password"
                autocomplete="current-password"
                placeholder="••••••••"
                required
              />
              <button
                type="button"
                class="pass-toggle"
                id="pass-toggle-btn"
                onclick="togglePassVis()"
                tabindex="-1"
              >
                <i class="fa-solid fa-eye" id="pass-eye-icon"></i>
              </button>
            </div>
          </div>

          <div id="login-error" class="login-error" style="display: none"></div>

          <button type="submit" class="login-submit" id="login-submit-btn">
            <span id="login-btn-text">AUTHENTICATE</span>
            <span id="login-btn-spinner" style="display: none">
              <i class="fa-solid fa-circle-notch fa-spin"></i>
            </span>
          </button>
        </form>

        <div class="login-hints">
          <div class="login-hint">
            <i class="fa-solid fa-user-shield"></i>
            <div>
              <div class="hint-role">Commander</div>
              <div class="hint-creds">
                commander@rdf.mil &nbsp;·&nbsp; command3r!
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
